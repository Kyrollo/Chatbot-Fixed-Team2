services:
  postgres:
    image: postgres:16
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.0
    command: start-dev --import-realm
    env_file:
      - ./.env
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./services/auth/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - rag-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/healthz > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  domain-service:
    build:
      context: ./services/domain-service
    env_file:
      - ./.env
    environment:
      SERVICE_PORT: ${DOMAIN_SERVICE_PORT}
      SERVICE_NAME: ${DOMAIN_SERVICE_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  ingestion-service:
    build:
      context: ./services/ingestion-service
    env_file:
      - ./.env
    environment:
      SERVICE_PORT: ${INGESTION_SERVICE_PORT}
      SERVICE_NAME: ${INGESTION_SERVICE_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      domain-service:
        condition: service_healthy
    ports:
      - "8002:8002"
    volumes:
      - uploads_data:/data/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  worker-service:
    build:
      context: ./services/worker-service
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - uploads_data:/data/uploads
    networks:
      - rag-network

  retrieval-service:
    build:
      context: ./services/retrieval-service
    env_file:
      - ./.env
    environment:
      SERVICE_PORT: ${RETRIEVAL_SERVICE_PORT}
      SERVICE_NAME: ${RETRIEVAL_SERVICE_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  generation-service:
    build:
      context: ./services/generation-service
    env_file:
      - ./.env
    environment:
      SERVICE_PORT: ${GENERATION_SERVICE_PORT}
      SERVICE_NAME: ${GENERATION_SERVICE_NAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      retrieval-service:
        condition: service_healthy
      domain-service:
        condition: service_healthy
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/generate/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  evaluation-service:
    build:
      context: ./services/evaluation-service
    env_file:
      - ./.env
    environment:
      SERVICE_PORT: ${EVALUATION_SERVICE_PORT}
      SERVICE_NAME: ${EVALUATION_SERVICE_NAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - evaluation
    depends_on:
      generation-service:
        condition: service_healthy
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/evaluate/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  traefik:
    image: traefik:v3.0
    depends_on:
      keycloak:
        condition: service_started
      domain-service:
        condition: service_healthy
      ingestion-service:
        condition: service_healthy
      retrieval-service:
        condition: service_healthy
      generation-service:
        condition: service_healthy
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./services/gateway/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./services/gateway/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - rag-network

networks:
  rag-network:
    name: rag-network

volumes:
  qdrant_storage:
  uploads_data:
