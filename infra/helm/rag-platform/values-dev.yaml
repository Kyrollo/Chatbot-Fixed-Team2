# =============================================================================
# infra/helm/rag-platform/values-dev.yaml
#
# Dev environment overrides — use on a local cluster (Docker Desktop / kind
# / minikube) while building and testing the chart itself. Smallest
# footprint, single replica per service.
#
# TLS is disabled here intentionally — matches the existing local-dev
# Caddy setup (Caddyfile) where the app runs on plain HTTP internally and
# TLS is only added at the gateway level when needed. For local dev,
# http://rag-platform.local is sufficient.
#
# To enable TLS locally (requires cert-manager installed on the cluster):
#   1. Set global.tls.enabled: true below
#   2. Install cert-manager once:
#        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   3. helm upgrade rag-platform ./infra/helm/rag-platform -f values-dev.yaml
#   Browser will show a warning (self-signed CA) — expected for local dev.
#
# Usage:
#   helm upgrade --install rag-platform ./infra/helm/rag-platform -f infra/helm/rag-platform/values-dev.yaml
# =============================================================================

global:
  imagePullPolicy: Always     # always pull from Docker Hub — avoids stale cached images on the node
  tls:
    enabled: false            # plain HTTP for local dev: http://rag-platform.local
    issuer: selfsigned        # ready to flip on — no config change needed, just set enabled: true
    clusterIssuerName: rag-platform-ca-issuer

monolith-service:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  hpa:
    enabled: false

evaluation-service:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  hpa:
    enabled: false

worker-service:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

rag-ui:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  hpa:
    enabled: false
  ingress:
    enabled: true
    host: rag-platform.local