# =============================================================================
# infra/helm/rag-platform/values.yaml
#
# Base values for the umbrella chart. These are the DEFAULTS — each
# environment file (values-dev.yaml / values-staging.yaml / values-prod.yaml)
# overrides replicas, resource requests, and a few env-specific settings.
#
# Deploy with an environment override, e.g.:
#   helm install rag-platform ./infra/helm/rag-platform -f values-dev.yaml
#
# Do NOT deploy with this file alone in a real environment — it has no
# environment selected, so it falls back to whatever each subchart's own
# values.yaml hardcodes (dev-like, conservative defaults).
# =============================================================================

# --- Image registry ----------------------------------------------------------
# imagePullPolicy is IfNotPresent so the cluster uses the locally-loaded
# image instead of trying to pull from a registry that doesn't exist yet.
# When a registry IS chosen later, only `repository` below needs to change.
global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

  # --- TLS configuration -----------------------------------------------------
  # Controls cluster-issuer.yaml AND ingress.yaml in rag-ui subchart.
  # All three templates read from this single block so there is one place
  # to change when switching environments.
  #
  # issuer options:
  #   "selfsigned"  — cert-manager generates its own local CA.
  #                   Use this for local dev (Docker Desktop / kind / minikube).
  #                   Browser will warn ("not trusted") — expected for local dev.
  #                   Matches the spirit of the Caddy local-dev setup (Caddyfile)
  #                   where TLS is a gateway concern, not per-service.
  #
  #   "letsencrypt" — Real publicly-trusted cert from Let's Encrypt (free,
  #                   auto-renewed by cert-manager). REQUIRES a real public
  #                   domain and a cluster reachable from the internet.
  #                   Cannot work from a laptop — Let's Encrypt must be able
  #                   to reach the cluster for HTTP-01 domain validation.
  #
  # Switching from selfsigned → letsencrypt later is a one-line change in
  # values-staging.yaml or values-prod.yaml — nothing else in the chart changes.
  tls:
    enabled: false                          # flip to true to enable HTTPS
    issuer: selfsigned                      # "selfsigned" or "letsencrypt"
    clusterIssuerName: rag-platform-ca-issuer

    # Only used when issuer: letsencrypt
    letsencrypt:
      # staging server for testing (won't be trusted by browsers but has
      # higher rate limits — switch to prod once confirmed working):
      #   https://acme-staging-v02.api.letsencrypt.org/directory
      # production server (trusted, rate-limited):
      #   https://acme-v02.api.letsencrypt.org/directory
      server: https://acme-v02.api.letsencrypt.org/directory
      email: ""                             # REQUIRED for letsencrypt — set in values-prod.yaml

# --- External dependencies ----------------------------------------------------
# PostgreSQL, Redis, and Keycloak are NOT deployed by this chart.
# These values are only used to build ConfigMap/Secret entries injected
# into each subchart's envFrom — the actual services must already be
# reachable from the cluster at these addresses.
externalServices:
  postgres:
    host: "postgres-external.default.svc.cluster.local"
    port: 5433
  redis:
    host: "redis-external.default.svc.cluster.local"
    port: 6379
  keycloak:
    host: "keycloak-external.default.svc.cluster.local"
    port: 8180

# --- Subchart toggles ---------------------------------------------------------
monolith-service:
  enabled: true

evaluation-service:
  enabled: true

worker-service:
  enabled: true

rag-ui:
  enabled: true
  ingress:
    enabled: false          # overridden per environment in values-dev/staging/prod.yaml
    host: rag-platform.local
    