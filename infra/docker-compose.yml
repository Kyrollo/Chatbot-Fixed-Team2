version: "3.9"

# =============================================================================
# RAG System — Full Development Stack
# All services read from the root .env file (one directory up).
#
# Usage:
#   docker compose -f infra/docker-compose.yml up --build          # core stack
#   docker compose -f infra/docker-compose.yml --profile eval up   # + evaluation
#
# First-time model pull (run AFTER stack is up):
#   docker exec ollama ollama pull llama3.2:3b
# =============================================================================

services:

  # ──────────────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE LAYER
  # ──────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: postgres
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-domain_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-domain_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Note: pull model after stack starts → docker exec ollama ollama pull llama3.2:3b
    networks:
      - rag-network

  # ──────────────────────────────────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ../services/auth/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/rag-system || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - rag-network

  # ──────────────────────────────────────────────────────────────────────────
  # API GATEWAY
  # ──────────────────────────────────────────────────────────────────────────

  traefik:
    image: traefik:v3.0
    container_name: traefik
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ../services/gateway/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../services/gateway/traefik/dynamic:/etc/traefik/dynamic:ro
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - rag-network

  # ──────────────────────────────────────────────────────────────────────────
  # APPLICATION SERVICES
  # ──────────────────────────────────────────────────────────────────────────

  domain-service:
    build:
      context: ../services/domain-service
    container_name: domain-service
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  ingestion-service:
    build:
      context: ../services/ingestion-service
    container_name: ingestion-service
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      domain-service:
        condition: service_healthy
    ports:
      - "8002:8002"
    volumes:
      - uploads_data:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  worker-service:
    build:
      context: ../services/worker-service
    container_name: worker-service
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - uploads_data:/data/uploads
      - models_cache:/root/.cache/huggingface
    networks:
      - rag-network

  retrieval-service:
    build:
      context: ../services/retrieval-service
    container_name: retrieval-service
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8003:8003"
    volumes:
      - models_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - rag-network

  generation-service:
    build:
      context: ../services/generation-service
    container_name: generation-service
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      retrieval-service:
        condition: service_healthy
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  evaluation-service:
    build:
      context: ../services/evaluation-service
    container_name: evaluation-service
    profiles: ["eval"]
    env_file: ../.env
    depends_on:
      generation-service:
        condition: service_healthy
    ports:
      - "8005:8005"
    networks:
      - rag-network

# ──────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ──────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
  ollama_data:
  models_cache:      # shared between worker and retrieval (e5-base model cache)

# ──────────────────────────────────────────────────────────────────────────────
# NETWORK — created automatically by Docker Compose
# ──────────────────────────────────────────────────────────────────────────────
networks:
  rag-network:
    driver: bridge
    name: rag-network