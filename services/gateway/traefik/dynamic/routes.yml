http:
  routers:

    # ── UI (catch-all, lowest priority — must come last conceptually) ──────────
    ui:
      rule: "PathPrefix(`/`)"
      service: ui
      # No auth middleware: the UI itself handles Keycloak redirect
      priority: 1
      entryPoints:
        - web

    domain-service:
      rule: "PathPrefix(`/domains`)"
      service: domain-service
      middlewares:
        - auth-keycloak
      entryPoints:
        - web

    ingestion-service:
      rule: "PathPrefix(`/ingest`)"
      service: ingestion-service
      middlewares:
        - auth-keycloak
      entryPoints:
        - web

    retrieval-service:
      rule: "PathPrefix(`/retrieve`)"
      service: retrieval-service
      middlewares:
        - auth-keycloak
      entryPoints:
        - web

    generation-service:
      rule: "PathPrefix(`/generate`)"
      service: generation-service
      middlewares:
        - auth-keycloak
      entryPoints:
        - web

    query-service:
      rule: "PathPrefix(`/query`)"
      service: generation-service
      middlewares:
        - auth-keycloak
      entryPoints:
        - web

    evaluation-service:
      rule: "PathPrefix(`/evaluate`)"
      service: evaluation-service
      middlewares:
        - auth-keycloak
      entryPoints:
        - web

  services:

    ui:
      loadBalancer:
        servers:
          - url: "http://ui:5173"

    domain-service:
      loadBalancer:
        servers:
          - url: "http://domain-service:8001"

    ingestion-service:
      loadBalancer:
        servers:
          - url: "http://ingestion-service:8002"

    retrieval-service:
      loadBalancer:
        servers:
          - url: "http://retrieval-service:8003"

    generation-service:
      loadBalancer:
        servers:
          - url: "http://generation-service:8004"

    evaluation-service:
      loadBalancer:
        servers:
          - url: "http://evaluation-service:8005"
