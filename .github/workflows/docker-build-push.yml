name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Base Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.base
          load: true
          tags: rag-base:dev

      - name: Build and Push Monolith Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.monolith
          push: true
          tags: hudamawood/rag-monolith:latest, hudamawood/rag-monolith:${{ github.sha }}

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: hudamawood/rag-worker:latest, hudamawood/rag-worker:${{ github.sha }}

      - name: Build and Push Evaluation Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.evaluation
          push: true
          tags: hudamawood/rag-evaluation:latest, hudamawood/rag-evaluation:${{ github.sha }}

      - name: Build and Push UI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.rag-ui
          push: true
          tags: hudamawood/rag-ui:latest, hudamawood/rag-ui:${{ github.sha }}
